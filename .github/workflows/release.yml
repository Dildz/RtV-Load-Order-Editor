name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Convert PNG icon to ICO
        run: |
          python -c "from PIL import Image; Image.open('RtV_LoE.png').save('RtV_LoE.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Build exe with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "RtV_LoadOrder_Editor" --icon RtV_LoE.ico --collect-all customtkinter main.py

      - name: Generate SHA256 hash
        run: |
          cd dist
          (Get-FileHash RtV_LoadOrder_Editor.exe -Algorithm SHA256).Hash | Out-File -Encoding ascii RtV_LoadOrder_Editor.exe.sha256
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RtV_LoadOrder_Editor
          path: |
            dist/RtV_LoadOrder_Editor.exe
            dist/RtV_LoadOrder_Editor.exe.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/RtV_LoadOrder_Editor.exe
            dist/RtV_LoadOrder_Editor.exe.sha256
          generate_release_notes: true
